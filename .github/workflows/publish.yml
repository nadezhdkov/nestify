name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: |
          python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1